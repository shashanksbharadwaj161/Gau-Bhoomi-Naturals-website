name: Build and Deploy — Gau Bhoomi Naturals

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Run node20 JavaScript actions on Node.js 24 to silence the node20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_WC_URL:    ${{ secrets.VITE_WC_URL }}
          VITE_WC_KEY:    ${{ secrets.VITE_WC_KEY }}
          VITE_WC_SECRET: ${{ secrets.VITE_WC_SECRET }}

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      - name: Deploy to Hostinger via FTP
        id: deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          local-dir:   ./dist/
          server-dir:  ${{ secrets.FTP_SERVER_DIR }}
          protocol:    ftp
          port:        21
          security:    loose
          dangerous-clean-slate: false
          exclude:     |
            **/.git*
            **/.git*/**
            **/node_modules/**

      # Hostinger FTP intermittently times out on the first connection
      # ("Timeout (control socket)"). Retry once within the same run so a
      # transient failure doesn't require a manual re-run.
      - name: Deploy to Hostinger via FTP (retry)
        if: steps.deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          local-dir:   ./dist/
          server-dir:  ${{ secrets.FTP_SERVER_DIR }}
          protocol:    ftp
          port:        21
          security:    loose
          dangerous-clean-slate: false
          exclude:     |
            **/.git*
            **/.git*/**
            **/node_modules/**
