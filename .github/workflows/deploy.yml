name: Build and Deploy — Gau Bhoomi Naturals

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_WC_URL:    ${{ secrets.VITE_WC_URL }}
          VITE_WC_KEY:    ${{ secrets.VITE_WC_KEY }}
          VITE_WC_SECRET: ${{ secrets.VITE_WC_SECRET }}

      - name: Copy .htaccess to dist
        run: cp public/.htaccess dist/.htaccess

      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:      ${{ secrets.FTP_HOST }}
          username:    ${{ secrets.FTP_USERNAME }}
          password:    ${{ secrets.FTP_PASSWORD }}
          local-dir:   ./dist/
          server-dir:  ${{ secrets.FTP_SERVER_DIR }}
          protocol:    ftps
          port:        21
          dangerous-clean-slate: false
          exclude:     |
            **/.git*
            **/.git*/**
            **/node_modules/**
